<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERN Core Module Test UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>MERN Core Module Auth Test</h1>
        
        <div class="forms-wrapper">
            <!-- Register Form -->
            <div class="form-container" id="register-section">
                <h2>Register</h2>
                <form id="register-form">
                    <div class="input-group">
                        <label for="reg-name">Name</label>
                        <input type="text" id="reg-name" required placeholder="Enter your name">
                    </div>
                    <div class="input-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" required placeholder="Enter your email">
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required placeholder="Min 6 characters">
                    </div>
                    <button type="submit" class="btn">Register</button>
                </form>
            </div>

            <!-- Login Form -->
            <div class="form-container" id="login-section">
                <h2>Login</h2>
                <form id="login-form">
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required placeholder="Enter your email">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn btn-secondary">Login</button>
                </form>
            </div>
        </div>

        <!-- SSO Simulation Section -->
        <div class="form-container sso-simulation">
            <h2>SSO Simulation (Service B)</h2>
            <p>Simulate logging into "Service B" using your UniLogin session.</p>
            <div class="btn-group">
                <button id="sso-btn" class="btn btn-primary">Login with UniLogin</button>
            </div>
            <button id="logout-btn" class="btn btn-small btn-danger" style="background: #e74c3c; margin-top: 10px;">Logout from UniLogin</button>
        </div>

        <!-- Result Console -->
        <div class="result-container">
            <h3>Response Console</h3>
            <div id="response-output" class="output">Waiting for action...</div>
            <button id="clear-btn" class="btn btn-small">Clear</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
