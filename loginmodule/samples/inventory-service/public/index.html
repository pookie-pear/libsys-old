<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Inventory Service - Service A</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; text-align: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        .btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .hidden { display: none; }
        #user-info { margin-top: 20px; color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Inventory Service (Service A)</h1>
        <p>This is an external service using UniLogin (Unil) SSO.</p>
        
        <div id="login-section">
            <a href="http://localhost:5001/api/sso/authorize?redirect_uri=http://localhost:5002/callback" id="login-link" class="btn">Login with UniLogin</a>
        </div>

        <div id="user-section" class="hidden">
            <p id="user-info"></p>
            <button onclick="logout()" class="btn" style="background: #e74c3c;">Logout</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            // Verify code with backend
            fetch('/api/verify-sso', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('inventory_user', JSON.stringify(data.data.user));
                    window.history.replaceState({}, document.title, "/"); // Clean URL
                    showUser(data.data.user);
                }
            });
        }

        const storedUser = localStorage.getItem('inventory_user');
        if (storedUser) showUser(JSON.parse(storedUser));

        function showUser(user) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('user-section').classList.remove('hidden');
            document.getElementById('user-info').innerText = `Logged in as: ${user.email}`;
        }

        function logout() {
            localStorage.removeItem('inventory_user');
            location.reload();
        }
    </script>
</body>
</html>
